name: Build SingBox Pure Module

on:
  workflow_dispatch:
    inputs:
      singbox_version:
        description: 'sing-box 版本 (留空自动获取最新)'
        required: false
        default: ''
      release:
        description: '发布 Release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: TSox

      - name: 获取 sing-box 最新版本
        id: singbox
        run: |
          if [ -n "${{ inputs.singbox_version }}" ]; then
            VERSION="${{ inputs.singbox_version }}"
          else
            VERSION=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sing-box 版本: $VERSION"

      - name: 获取 yq 最新版本
        id: yq
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/mikefarah/yq/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "yq 版本: $VERSION"

      - name: 下载 sing-box (arm64)
        run: |
          VERSION=${{ steps.singbox.outputs.version }}
          VER_NUM=${VERSION#v}
          URL="https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VER_NUM}-android-arm64.tar.gz"
          echo "下载: $URL"
          curl -L "$URL" -o singbox.tar.gz
          tar -xzf singbox.tar.gz
          mkdir -p box/bin
          mv sing-box-*/sing-box box/bin/sing-box
          chmod 755 box/bin/sing-box
          echo "sing-box 下载完成: $(ls -lh box/bin/sing-box)"

      - name: 下载 yq (arm64)
        run: |
          VERSION=${{ steps.yq.outputs.version }}
          URL="https://github.com/mikefarah/yq/releases/download/${VERSION}/yq_linux_arm64"
          echo "下载: $URL"
          curl -L "$URL" -o box/bin/yq
          chmod 755 box/bin/yq
          echo "yq 下载完成: $(ls -lh box/bin/yq)"

      - name: 打包模块
        id: package
        run: |
          SINGBOX_VER=${{ steps.singbox.outputs.version }}
          ZIP_NAME="SingBox_Pure_${SINGBOX_VER}.zip"
          zip -r "$ZIP_NAME" \
            META-INF \
            box/bin \
            box/scripts \
            box/sing-box \
            box/settings.ini \
            box/ap.list.cfg \
            box/package.list.cfg \
            box/gid.list.cfg \
            box/crontab.cfg \
            action.sh \
            box_service.sh \
            customize.sh \
            module.prop \
            uninstall.sh \
            webroot
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "打包完成: $(ls -lh $ZIP_NAME)"

      - name: 更新 module.prop 版本号
        run: |
          SINGBOX_VER=${{ steps.singbox.outputs.version }}
          DATE=$(date +%Y%m%d)
          sed -i "s/^version=.*/version=SingBox${SINGBOX_VER}-Pure/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${DATE}/" module.prop

      - name: 发布 Release
        if: inputs.release == true || inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SingBox${{ steps.singbox.outputs.version }}
          name: SingBox Pure ${{ steps.singbox.outputs.version }}
          body: |
            ## SingBox Pure ${{ steps.singbox.outputs.version }}

            ### 内置组件
            - sing-box `${{ steps.singbox.outputs.version }}`
            - yq `${{ steps.yq.outputs.version }}`

            ### 安装
            在 Magisk / KernelSU / APatch 管理器中刷入 zip 文件
          files: ${{ steps.package.outputs.zip_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SingBox-Pure-${{ steps.singbox.outputs.version }}
          path: ${{ steps.package.outputs.zip_name }}
