mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
mode: Rule
bind-address: '*'
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: strict
external-controller: 127.0.0.1:9090
external-ui: ./zashboard

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mv3-*-*.googlevideo.com
    - rule-set:private_domain
    - rule-set:Fake-IP-Filter

dns:
  enhanced-mode: fake-ip
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:Fake-IP-Filter
  proxy-server-nameserver:
    - 223.5.5.5
    - 120.53.53.53
  nameserver-policy:
    rule-set:cn_domain:
      - 223.5.5.5
      - 120.53.53.53
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

