proxy-groups:
  - name: 国外代理
    type: select
    proxies:
      - 香港节点
      - 国外节点
    icon: https://ghfast.top/raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Proxy.png

  - name: 国外节点
    type: select
    proxies:
      - 日本节点1
      - 日本节点2
      - 日本节点3
      - 日本节点4
      - 新加坡节点1
      - 新加坡节点2
      - 新加坡节点3
      - 新加坡节点4
      - 韩国节点1
      - 韩国节点2
    icon: https://ghfast.top/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cloudflare.png
  - name: 国内直连
    type: select
    proxies:
      - DIRECT
      - 香港节点
      - 国外节点
